name: VibeFader
options:
  bundleIdPrefix: com.chadon
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.30"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.2"

targets:
  VibeFader:
    type: application
    platform: macOS
    sources:
      - VibeFader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chadon.VibeFader
        INFOPLIST_FILE: VibeFader/Info.plist
        CODE_SIGN_ENTITLEMENTS: VibeFader/VibeFader.entitlements
        PRODUCT_NAME: VibeFader
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: complete
